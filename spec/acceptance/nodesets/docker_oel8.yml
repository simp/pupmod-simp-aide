---
HOSTS:
  oel8:
    roles:
    - server
    - default
    - master
    - simp_server
    - el8
    platform: el-8-x86_64
    hypervisor: docker
    image: oraclelinux:8
    docker_cmd: '/usr/sbin/init'
    docker_preserve_image: true
    docker_image_commands:
      # Puppet Deps
      - 'yum install -y rsync openssl openssh-server'
    dockeropts:
      HostConfig:
        Memory: 536870912
        Privileged: true
CONFIG:
  log_level: verbose
  type: aio
  puppet_collection: <%= ENV.fetch('BEAKER_PUPPET_COLLECTION', 'openvox8') %>